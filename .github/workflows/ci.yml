name: CI

on:
  workflow_dispatch:
    inputs:
      force_all_os:
        description: 'Run shell-unit on all 3 OSes (verification aid for the nightly matrix)'
        type: boolean
        default: false
  schedule:
    - cron: '17 7 * * *'   # nightly, UTC

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: bash scripts/ci/check-no-secrets.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # --severity=warning makes the gate deterministic across shellcheck
      # versions: SC2329 (note-level, "function never invoked") is the only
      # check newer shellchecks add over the pre-commit-pinned 0.10.x, and it
      # only fires on pre-existing files. pre-commit stays the strict
      # style-level local gate; CI catches warnings+errors regardless of the
      # runner's shellcheck version.
      # git pathspec `*` crosses `/`, so 'scripts/*.sh' matches every depth
      # (top-level setup.sh/adopt.sh/… included). 'scripts/**/*.sh' would NOT —
      # in a git pathspec `**/` requires an intervening directory, silently
      # dropping the 34 top-level scripts. xargs -r: no files -> don't run
      # shellcheck on stdin.
      - run: git ls-files -z 'scripts/*.sh' | grep -zv '^scripts/statusline/' | xargs -0 -r shellcheck --severity=warning

  node-suites:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pkg: [jira, bitbucket, himmel-run]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm ci
        working-directory: scripts/${{ matrix.pkg }}
      - run: npm test
        working-directory: scripts/${{ matrix.pkg }}

  bun-suites:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: cd scripts/luna-vitals && bun install --frozen-lockfile && bun test
      # --frozen-lockfile fails if bun.lock has drifted from package.json. Catches
      # the class of bug where a dep range is bumped in package.json but the
      # lockfile is never regenerated (HIMMEL-553). Install-only: test coverage for
      # luna-correlate is out of scope for this guard.
      - run: cd marketplace/plugins/luna-correlate && bun install --frozen-lockfile

  # Multi-OS, gated to the nightly to stay free-tier-cheap: a plain
  # workflow_dispatch (and any non-schedule event) runs ubuntu only; `schedule`
  # — or a dispatch with force_all_os=true — adds windows (2x) + macOS (10x),
  # paid once a night. windows/macOS are NON-GATING this phase (continue-on-error
  # scoped to the non-ubuntu legs): their per-suite PASS/FAIL is advisory in the
  # job log while ubuntu stays the required gate. Tightening the new OSes to
  # gating-green is the data-driven follow-up (HIMMEL-494 phase 3).
  shell-unit:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ (github.event_name == 'schedule' || inputs.force_all_os)
               && fromJSON('["ubuntu-latest","windows-latest","macos-latest"]')
               || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os != 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7
      # Explicit `bash` prefix: on windows-latest the default run shell is pwsh,
      # but Git Bash is preinstalled + on PATH, so `bash …` runs under MSYS2.
      - run: bash scripts/ci/run-shell-tests.sh
