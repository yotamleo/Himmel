name: CI

on:
  # PR gating (HIMMEL-594): the cheap ubuntu-only jobs run on every PR so a
  # non-conventional commit, a secret, a shellcheck warning, or a failing shell
  # suite blocks merge. The EXPENSIVE multi-OS matrix stays nightly-only — the
  # shell-unit matrix below expands to windows+macOS only on `schedule`
  # (or a dispatch with force_all_os), so a PR never triggers the paid legs.
  pull_request:
  # Post-merge verification (HIMMEL-511): re-run the cheap ubuntu gates when code
  # lands on main, catching anything that reached main outside the PR path. The
  # shell-unit matrix stays ubuntu-only on `push` (the paid windows/macOS legs are
  # schedule-only), so this adds no multi-OS cost.
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_all_os:
        description: 'Run shell-unit on all 3 OSes (verification aid for the nightly matrix)'
        type: boolean
        default: false
  schedule:
    - cron: '17 7 * * *'   # nightly, UTC

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: bash scripts/ci/check-no-secrets.sh

  # Commit-message governance (HIMMEL-594): every commit in the PR range must be
  # conventional + (if a HIMMEL- ticket is present) well-formed. Reuses the local
  # commit-msg gate (scripts/hooks/check-commit-msg.sh) over the range so CI and
  # the author-time hook agree. fetch-depth: 0 → full history for the range walk.
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Lint commit messages in the PR range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bash scripts/ci/check-commit-range.sh "${{ github.event.pull_request.base.sha }}"
          else
            bash scripts/ci/check-commit-range.sh
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # --severity=warning makes the gate deterministic across shellcheck
      # versions: SC2329 (note-level, "function never invoked") is the only
      # check newer shellchecks add over the pre-commit-pinned 0.10.x, and it
      # only fires on pre-existing files. pre-commit stays the strict
      # style-level local gate; CI catches warnings+errors regardless of the
      # runner's shellcheck version.
      # git pathspec `*` crosses `/`, so 'scripts/*.sh' matches every depth
      # (top-level setup.sh/adopt.sh/… included). 'scripts/**/*.sh' would NOT —
      # in a git pathspec `**/` requires an intervening directory, silently
      # dropping the 34 top-level scripts. xargs -r: no files -> don't run
      # shellcheck on stdin.
      - run: git ls-files -z 'scripts/*.sh' | grep -zv '^scripts/statusline/' | xargs -0 -r shellcheck --severity=warning

  node-suites:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pkg: [jira, bitbucket, himmel-run, ci-orchestrator]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - run: npm ci
        working-directory: scripts/${{ matrix.pkg }}
      - run: npm test
        working-directory: scripts/${{ matrix.pkg }}

  lanes-suite:
    # HIMMEL-689: scripts/lanes is a zero-dependency ESM test package — no
    # package.json (a committed one under scripts/ trips the npm-audit gates for a
    # package with nothing to install). Run its node:test suites directly.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - run: node --test "scripts/lanes/tests/**/*.test.mjs"

  bun-suites:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: cd scripts/luna-vitals && bun install --frozen-lockfile && bun test
      # --frozen-lockfile fails if bun.lock has drifted from package.json. Catches
      # the class of bug where a dep range is bumped in package.json but the
      # lockfile is never regenerated (HIMMEL-553). Install-only: test coverage for
      # luna-correlate is out of scope for this guard.
      - run: cd marketplace/plugins/luna-correlate && bun install --frozen-lockfile

  # Security / dependency scanning lane (HIMMEL-510): mirrors the local
  # pre-commit/pre-push security gates (.pre-commit-config.yaml) by invoking the
  # SAME scripts/hooks/* gate scripts, so CI and the author-time hooks stay in
  # lockstep — a vuln/license/lockfile/secret problem that blocks a local push
  # also blocks the PR. Secret-free + ubuntu-only; the only network reached is
  # public (GitHub releases for the gitleaks binary, the npm registry for audit/
  # license/signature checks). Deferred to a follow-up: bandit (python SAST —
  # needs a baseline #nosec triage of pre-existing VM/SSH tooling before it can
  # gate green) and better-npm-audit (redundant with the npm-audit gate below).
  security-scan:
    runs-on: ubuntu-latest
    # This job does the most network I/O in the workflow (gitleaks download +
    # `npm ci` across ~9 packages); cap it so a hung download/install can't
    # burn a full 6h runner slot (codex-3 CR hardening).
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2

      # gitleaks: pinned to the SAME version as the pre-commit hook
      # (.pre-commit-config.yaml → gitleaks rev v8.21.2) and reuses .gitleaks.toml,
      # so a secret the local hook catches is caught here too. `dir` scans the
      # checked-out working tree; gitleaks exits non-zero when a leak is found.
      - name: gitleaks secret scan (reuses .gitleaks.toml)
        run: |
          ver=8.21.2
          # Pin the exact release bytes: verify the published SHA256 before
          # extracting/executing, so a tampered or MITM'd download cannot run
          # (it would be silly for the SECURITY lane to run an unverified
          # scanner binary). Update `sha` in lockstep with `ver`.
          sha=5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          echo "${sha}  /tmp/gitleaks.tgz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          /tmp/gitleaks dir . --config .gitleaks.toml --redact --no-banner

      # Lockfile integrity (npm + bun) — pre-commit `lockfile-integrity`.
      # npm path is `npm ci --dry-run` (no install needed); bun path is
      # `bun install --frozen-lockfile --dry-run` (setup-bun above provides bun).
      - name: lockfile integrity (npm + bun)
        run: bash scripts/hooks/check-lockfile-integrity.sh

      # uv lock integrity (python) — pre-commit `uv-lock-integrity`. No
      # pyproject.toml in the tree today, so this self-skips (kept for lockstep:
      # the day a python project lands, CI gates its uv.lock with no further edit).
      - name: uv lock integrity (python)
        run: bash scripts/hooks/check-uv-lock.sh

      # npm audit (production, high+) — pre-push `npm-audit`. Self-installs prod
      # deps (`npm ci --omit=dev --ignore-scripts`) for every committed
      # package.json, leaving node_modules in place for the signatures step below.
      - name: npm audit (production, high+)
        run: bash scripts/hooks/check-npm-audit.sh

      # npm license allowlist — pre-push `npm-licenses`.
      - name: npm license allowlist
        run: bash scripts/hooks/check-npm-licenses.sh

      # npm audit signatures (production) — pre-push `npm-audit-signatures`. This
      # gate does NOT self-install; it relies on the node_modules the npm-audit
      # step above materialized for the scripts/{jira,bitbucket,himmel-run}
      # packages, so it MUST run after that step.
      - name: npm audit signatures (production)
        run: bash scripts/hooks/check-npm-audit-signatures.sh

  # Multi-OS, gated to the nightly to stay free-tier-cheap: a plain
  # workflow_dispatch (and any non-schedule event) runs ubuntu only; `schedule`
  # — or a dispatch with force_all_os=true — adds windows (2x) + macOS (10x),
  # paid once a night. windows/macOS are NON-GATING this phase (continue-on-error
  # scoped to the non-ubuntu legs): their per-suite PASS/FAIL is advisory in the
  # job log while ubuntu stays the required gate. Tightening the new OSes to
  # gating-green is the data-driven follow-up (HIMMEL-494 phase 3).
  shell-unit:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ (github.event_name == 'schedule' || inputs.force_all_os)
               && fromJSON('["ubuntu-latest","windows-latest","macos-latest"]')
               || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os != 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7
      # arm-resume's non-dry-run cases exercise the real `at` scheduler backend,
      # which the supported runtime provides (HIMMEL-594 `ubuntu.sh` installs +
      # enables at/atd). GitHub's ubuntu image ships without `at`, so CI fell back
      # to the crontab path and ~2 arm-resume cases diverged from a real install.
      # Install + enable it on Linux so CI mirrors the supported runtime
      # (HIMMEL-619). Scoped to Linux: no-op on the nightly windows/macOS legs.
      - name: Install + enable at/atd (Linux — arm-resume scheduler backend)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y at
          sudo systemctl enable --now atd || sudo service atd start || true
      # Explicit `bash` prefix: on windows-latest the default run shell is pwsh,
      # but Git Bash is preinstalled + on PATH, so `bash …` runs under MSYS2.
      # FAIL_LOG_DIR: full failed-suite logs land there and upload as an
      # artifact below — the inline tail is bounded, so without this the
      # failing assertion can be unrecoverable from Actions logs (HIMMEL-963).
      - run: bash scripts/ci/run-shell-tests.sh
        env:
          FAIL_LOG_DIR: failed-suite-logs
      - name: Upload failed-suite logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: shell-unit-failed-logs-${{ matrix.os }}
          path: failed-suite-logs/
          if-no-files-found: ignore
          retention-days: 14
