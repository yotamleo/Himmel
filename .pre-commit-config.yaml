repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Vendored Obsidian plugin bundles (minified js/css) are kept byte-for-byte
      # verbatim from upstream for license fidelity — don't reformat them.
      - id: trailing-whitespace
        exclude: '^templates/luna-second-brain/\.obsidian/plugins/.*\.(js|css)$'
      - id: end-of-file-fixer
        exclude: '^templates/luna-second-brain/\.obsidian/plugins/.*\.(js|css)$'
      - id: check-yaml
      - id: check-json

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: worktree-isolation
        name: Worktree isolation check
        language: system
        entry: bash scripts/hooks/check-worktree-isolation.sh
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: telegram-fork-drift
        name: telegram-himmel upstream drift watcher
        entry: bash scripts/hooks/check-telegram-fork-drift.sh
        language: system
        always_run: true
        pass_filenames: false

      - id: merged-branch-check
        name: Merged branch check
        language: system
        entry: bash scripts/hooks/check-merged-branch.sh
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: mcp-plugin-refs
        name: Block committed refs to MCP Jira tools with plugin equivalent
        language: system
        entry: bash scripts/hooks/check-mcp-plugin-refs.sh
        pass_filenames: true
        stages: [pre-commit]

      - id: no-headless-claude
        name: Block headless claude (-p / --print / --bg) introductions (HIMMEL-128)
        language: system
        entry: bash scripts/hooks/check-no-headless-claude.sh
        pass_filenames: true
        stages: [pre-commit]

      - id: no-headless-gemini
        name: Block headless gemini (-p / --prompt / --bg) introductions (HIMMEL-157)
        language: system
        entry: bash scripts/hooks/check-no-headless-gemini.sh
        pass_filenames: true
        stages: [pre-commit]

      - id: hookspath-misconfig
        name: core.hooksPath misconfiguration check
        language: system
        entry: bash scripts/hooks/check-hookspath.sh
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: lockfile-integrity
        name: lockfile integrity (npm)
        language: system
        entry: bash scripts/hooks/check-lockfile-integrity.sh
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: no-push-to-main
        name: Block direct push to main
        language: system
        entry: bash scripts/hooks/check-push-target.sh
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: npm-audit
        name: npm audit (production, high+) on every npm package
        language: system
        entry: bash scripts/hooks/check-npm-audit.sh
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: npm-licenses
        name: npm license allowlist check (production)
        language: system
        entry: bash scripts/hooks/check-npm-licenses.sh
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: npm-audit-signatures
        name: npm audit signatures (production)
        entry: bash scripts/hooks/check-npm-audit-signatures.sh
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true

      - id: code-review-before-push
        name: Multi-agent code review (pr-review-toolkit) before push
        language: system
        entry: bash scripts/hooks/check-cr-before-push.sh
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: pr-mergeable-gate
        name: Refuse push when PR is CONFLICTING (HIMMEL-136)
        language: system
        entry: bash scripts/hooks/check-pr-mergeable.sh
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: no-force-push
        name: Refuse force-push to protected refs (HIMMEL-136)
        language: system
        entry: bash scripts/hooks/check-no-force-push.sh
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: platforms-tested
        name: Cross-platform attestation for shell/script changes
        language: system
        entry: bash scripts/hooks/check-platforms-tested.sh
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: security-reviewed
        name: Security-review attestation for non-docs code changes (HIMMEL-176)
        language: system
        entry: bash scripts/hooks/check-security-reviewed.sh
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: conventional-commit-msg
        name: Conventional commit message + optional HIMMEL-N
        language: system
        entry: bash scripts/hooks/check-commit-msg.sh
        pass_filenames: false
        always_run: true
        stages: [commit-msg]

      - id: uv-lock-integrity
        name: uv lock integrity (python)
        language: system
        entry: bash scripts/hooks/check-uv-lock.sh
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: pip-hashes
        name: requirements*.txt must use --generate-hashes
        language: system
        entry: bash scripts/hooks/check-pip-hashes.sh
        files: '(^|/)requirements.*\.txt$'
        stages: [pre-commit]
