global:
  scrape_interval: 60s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: flow-exporter
    static_configs:
      - targets:
          - 127.0.0.1:9877

  - job_name: windows_exporter
    static_configs:
      - targets:
          - 127.0.0.1:9182
