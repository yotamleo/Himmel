# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit review settings (HIMMEL-926). Versioned here so the GitHub App
# and the CLI lane (/pr-check step 3.2, scripts/cr/coderabbit-review.sh) share
# one config; this file overrides the org dashboard for this repo.
#
# Decisions (rationale on HIMMEL-926):
#   - profile chill: CodeRabbit is one finding source in a multi-critic panel;
#     the trial question is uniques, not volume — assertive nitpicks add
#     adjudication cost without answering it.
#   - request_changes_workflow off: the merge gate is a clean /pr-check
#     (CR-marker hook); a bot "request changes" state adds a second,
#     unenforced gate on a repo merged via --admin.
#   - auto_review off (HIMMEL-1252): the App reviews ONLY on an explicit
#     `@coderabbitai review` comment, not on every push. himmel's PRIMARY CR
#     gate is the CLI lane (/pr-check step 3.2, coderabbit-review.sh), which is
#     independent of the App and unaffected by this flag; the per-push App
#     auto-review was a duplicative signal burning the shared CR rate limit.
#     Consequence: CodeRabbit is no longer a merge gate — it was also dropped
#     from the public repo's branch-protection required checks (it would
#     otherwise be an unsatisfiable required context with auto-review off).
#   - Jira integration deliberately NOT connected: the jira CLI owns that loop.
language: "en-US"
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  collapse_walkthrough: true
  auto_review:
    # HIMMEL-1252: comment-triggered, not per-push. false = the App does not
    # auto-review on push/open; a reviewer posts `@coderabbitai review` (or
    # `@coderabbitai full review`) to run it on demand. Conserves the shared CR
    # rate limit; the /pr-check CLI lane remains the primary gate. The
    # base_branches setting below is inert while this is false (it only scopes
    # which bases get AUTO-reviewed) — kept so re-enabling needs no re-derivation.
    enabled: false
    drafts: false
    # base_branches (HIMMEL-1102): defaults to [] = ONLY the repo default
    # branch, so every STACKED PR was silently skipped -- CodeRabbit posted
    # "Review skipped: reviews are disabled for this base branch" AND a GREEN
    # "pass" check, i.e. a passing badge for a review that never ran. Stacking
    # is a routine himmel pattern (a PR based on an open PR, to avoid
    # conflicting a live session's CR loop), so this fired often and silently.
    # ADDITIVE, not a replacement -- setting this does NOT stop main from being
    # reviewed. Per the CodeRabbit docs (configuration/auto-review): "The
    # default branch is always included, and the base_branches setting extends
    # this set." So main PRs keep their auto-review regardless; this only ADDS
    # non-default bases. (A CR pass on this change raised the opposite concern
    # -- that a pattern list drops the default branch -- so the answer is
    # recorded here rather than re-litigated by the next reader.)
    #
    # ".*" = EVERY base branch, deliberately (operator: CodeRabbit on all our
    # items). An enumerated prefix list was written first and REJECTED: it is
    # the same drift trap this ticket exists to kill. That draft listed only the
    # type/slug vocabulary (feat|fix|chore|docs|refactor|test) and ALREADY
    # missed glm/ -- live on origin right now -- plus the claudex/ and
    # handover/ prefixes the offload lanes and handover system mint. A
    # hand-maintained list rots the moment a new lane appears, and its failure
    # mode is invisible: those PRs just quietly stop being reviewed. A catch-all
    # cannot drift. (This also moots the anchoring bug CR caught in that draft:
    # unanchored "fix/.*" matched hotfix/foo.)
    base_branches:
      - ".*"
  path_filters:
    - "!**/package-lock.json"
  path_instructions:
    - path: "scripts/**/*.sh"
      instructions: >-
        Shell must stay bash 3.2-compatible (macOS default): no associative
        arrays, no mapfile, no ${var,,}. Scripts run cross-platform on Windows
        Git Bash, macOS, and Linux — flag GNU-only flags and non-portable
        constructs. Guardrail hooks are fail-closed by design; critic and
        availability wrappers are fail-open — check the file header's exit
        contract before flagging exit semantics as a bug.
    - path: "**/*.ps1"
      instructions: >-
        Some PowerShell files are Windows twins of a same-named .sh script in
        the same directory. Only when that same-named .sh counterpart exists,
        flag behavioral drift between the pair rather than style differences;
        standalone .ps1 files (no .sh twin) carry no parity requirement.
chat:
  auto_reply: true
