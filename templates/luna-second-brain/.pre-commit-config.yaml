# Vendored Obsidian plugin binaries + per-operator workspace state churn on
# every save. Excluded globally so the basic hooks don't rewrite them on
# every operator's machine. Tracked separately if/when we move to plugin
# installer + community-plugins.json driven setup.
exclude: '^\.obsidian/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Vault content is user data, not code — pre-commit must VALIDATE it
      # (gitleaks/check-*) but never REWRITE it. So these two auto-fixers run
      # ONLY on the code/config files himmel ships (allowlist), never on notes
      # or ingested sources. Two reasons, both real:
      #   1. trailing-whitespace strips Markdown hard-line-breaks (two trailing
      #      spaces) from prose, and the churn from either fixer aborts the
      #      unattended autosync commit (HIMMEL-501).
      #   2. On Windows the fixers print the filename to a cp1252 stdout, so a
      #      non-ASCII name (Hebrew/CJK/accented source notes) raises
      #      UnicodeEncodeError — and they rewrite the file BEFORE crashing,
      #      leaving a silent whitespace-only diff (HIMMEL-615). An allowlist of
      #      ASCII-named code/config files sidesteps this entirely; a denylist
      #      cannot enumerate every non-ASCII name a vault might hold.
      # Code/config files are ASCII-named by convention, so trailing-ws fixing
      # on them is both safe and wanted. (himmel-managed scripts are .sh/.ps1;
      # configs are .yaml/.yml/.json/.toml.)
      # Vault-root `.manifest.json` (distinct from the per-plugin
      # .obsidian/plugins/*/manifest.json already excluded above) is machine-
      # generated by the vault-side ingest pipeline — not shipped in this
      # template; it writes VAULT_ROOT/.manifest.json without a trailing
      # newline. Letting the fixers rewrite it at commit time fights the
      # generator and trips pre-commit's stash-rollback path, which can crash
      # and silently drop unstaged changes — observed 2026-07-09: lost
      # .obsidian plugin updates, recovered from the retained
      # ~/.cache/pre-commit patch (HIMMEL-834). check-json still validates it.
      - id: trailing-whitespace
        files: '\.(sh|ps1|yaml|yml|json|toml)$'
        exclude: '^\.manifest\.json$'
      - id: end-of-file-fixer
        files: '\.(sh|ps1|yaml|yml|json|toml)$'
        exclude: '^\.manifest\.json$'
      - id: check-yaml
      - id: check-json

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: worktree-isolation
        name: Worktree isolation check (refuse commits on main)
        language: system
        entry: bash scripts/hooks/check-worktree-isolation.sh
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: no-push-to-main
        name: Block direct push to main
        language: system
        entry: bash scripts/hooks/check-push-target.sh
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: no-force-push
        name: Refuse force-push to protected refs
        language: system
        entry: bash scripts/hooks/check-no-force-push.sh
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: conventional-commit-msg
        name: Conventional commit message (TICKET-N optional)
        language: system
        entry: bash scripts/hooks/check-commit-msg.sh
        pass_filenames: false
        always_run: true
        stages: [commit-msg]
