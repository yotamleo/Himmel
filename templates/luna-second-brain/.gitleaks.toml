# gitleaks config for the luna second-brain vault.
# Keeps the full built-in ruleset and only adds a path allowlist for the
# vendored third-party Obsidian plugin bundles shipped under .obsidian/plugins/.
# Those bundles are minified upstream code; gitleaks' generic-api-key rule flags
# high-entropy minified identifiers (e.g. node-forge's pki.setRsaPrivateKey in
# obsidian-local-rest-api) as false-positive "secrets". The pre-commit
# `exclude: '^\.obsidian/'` does NOT reach gitleaks (the hook scans the staged
# diff directly), so the allowlist has to live here. Real credentials
# (.env, plugins' data.json) are gitignored.
[extend]
useDefault = true

[allowlist]
description = "Vendored plugin bundles + known-benign local loopback proxy token"
paths = [
  '''\.obsidian/plugins/''',
]
# The end-session-wiki hook captures session bash verbatim, so probes against
# the local CLIProxyAPI gateway (127.0.0.1:8317) land in sessions/*.md as
# `curl -H "Authorization: Bearer himmel-local-claudex"`. That token is a
# documented, loopback-only, shared constant checked into himmel itself
# (scripts/setup/cli-proxy-lane.ps1), not a credential. Suppress the generic
# curl-auth-header false positive for this one literal only. Anchored (^…$)
# so it suppresses ONLY the exact constant — a prefixed/suffixed bearer
# credential (himmel-local-claudex-<real-secret>) is still caught.
regexes = [
  '''^himmel-local-claudex$''',
]
